name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools and dev dependencies
        run: pip install build && pip install -e ".[dev]"

      - name: Run full test suite before building
        run: pytest tests/ -v --tb=short

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel contents
        run: |
          python - <<'EOF'
          import zipfile, sys
          wheel = next(__import__('pathlib').Path('dist').glob('*.whl'))
          with zipfile.ZipFile(wheel) as zf:
              names = zf.namelist()
          if not any(n.endswith('py.typed') for n in names):
              print("ERROR: py.typed missing from wheel")
              sys.exit(1)
          print(f"Wheel OK: {wheel.name}")
          for n in names:
              print(f"  {n}")
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Extract the block between ## [VERSION] and the next ## heading
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Write to a file to handle multiline safely
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "asynchaos ${{ github.ref_name }}"
          body_path: release_notes.txt
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}

