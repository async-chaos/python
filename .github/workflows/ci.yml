name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=asynchaos --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e .

      - name: Run all examples
        run: |
          for f in examples/*.py; do
            echo "=== $f ==="
            python "$f"
            echo "--- exit 0 ---"
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Check import order and syntax
        run: python -c "import asynchaos; print(asynchaos.__version__)"

      - name: Verify zero runtime dependencies
        run: |
          python - <<'EOF'
          import importlib.metadata
          dist = importlib.metadata.distribution("asynchaos")
          requires = dist.metadata.get_all("Requires-Dist") or []
          runtime_deps = [r for r in requires if "extra ==" not in r]
          if runtime_deps:
              print(f"ERROR: unexpected runtime dependencies: {runtime_deps}")
              exit(1)
          print("OK: zero runtime dependencies")
          EOF
